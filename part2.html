<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Product Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#2874f0;
    color:white;
    padding:20px;
    text-align:center;
}

header input,
header select{
    margin:10px;
    padding:10px;
    width:220px;
    border:none;
    border-radius:5px;
    font-size:16px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
    margin:10px 0;
}

button{
    padding:10px 20px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b57d0;
}
</style>

</head>
<body>

<header>

<h1>🛒 E-Commerce Product Gallery</h1>

<input
type="text"
id="search"
placeholder="Search Products...">

<select id="category">

<option value="All">All Categories</option>

<option value="Electronics">Electronics</option>

<option value="Fashion">Fashion</option>

<option value="Shoes">Shoes</option>

</select>

</header>

<div class="products" id="products"></div>

<script>

const products=[

{
name:"Laptop",
category:"Electronics",
price:55000,
image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600"
},

{
name:"Smartphone",
category:"Electronics",
price:25000,
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600"
},

{
name:"Headphones",
category:"Electronics",
price:3500,
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600"
},

{
name:"T-Shirt",
category:"Fashion",
price:799,
image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600"
},

{
name:"Jeans",
category:"Fashion",
price:1499,
image:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=600"
},

{
name:"Sneakers",
category:"Shoes",
price:2999,
image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
},

{
name:"Sports Shoes",
category:"Shoes",
price:3999,
image:"https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=600"
},

{
name:"Watch",
category:"Fashion",
price:4999,
image:"https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600"
}

];

const productContainer=document.getElementById("products");

function displayProducts(items){

productContainer.innerHTML="";

items.forEach(product=>{

productContainer.innerHTML+=`

<div class="card">

<img src="${product.image}" alt="${product.name}">

<div class="card-content">

<h2>${product.name}</h2>

<p><b>Category:</b> ${product.category}</p>

<p class="price">₹${product.price}</p>

<button onclick="addCart('${product.name}')">
Add to Cart
</button>

</div>

</div>

`;

});

}

displayProducts(products);

document.getElementById("search").addEventListener("keyup",filterProducts);

document.getElementById("category").addEventListener("change",filterProducts);

function filterProducts(){

const search=document.getElementById("search").value.toLowerCase();

const category=document.getElementById("category").value;

const filtered=products.filter(product=>{

const nameMatch=product.name.toLowerCase().includes(search);

const categoryMatch=category==="All" || product.category===category;

return nameMatch && categoryMatch;

});

displayProducts(filtered);

}

function addCart(product){

alert(product+" added to cart successfully!");

}

</script>

</body>
</html>
